# Storage backend selector. Values: "postgres" (default), "sqlite", or "foundationdb".
# sqlite is single-node only — incompatible with ORISUN_NATS_CLUSTER_ENABLED=true.
backend:
  type: ${ORISUN_BACKEND:postgres}

# SQLite backend settings (used when backend.type=sqlite).
# Each boundary gets its own file at {dir}/{boundary}.db.
sqlite:
  dir: ${ORISUN_SQLITE_DIR:./data/orisun/sqlite}
  synchronous: ${ORISUN_SQLITE_SYNCHRONOUS:NORMAL}
  busyTimeoutMs: ${ORISUN_SQLITE_BUSY_TIMEOUT_MS:5000}
  readPoolSize: ${ORISUN_SQLITE_READ_POOL_SIZE:0}
  cacheSize: ${ORISUN_SQLITE_CACHE_SIZE:0}
  mmapSize: ${ORISUN_SQLITE_MMAP_SIZE:0}
  walAutoCheckpoint: ${ORISUN_SQLITE_WAL_AUTO_CHECKPOINT:0}
  tempStore: ${ORISUN_SQLITE_TEMP_STORE:MEMORY}

# FoundationDB backend settings (used when backend.type=foundationdb).
# Build with -tags foundationdb and install native FoundationDB client libraries.
foundationDB:
  clusterFile: ${ORISUN_FDB_CLUSTER_FILE:}
  apiVersion: ${ORISUN_FDB_API_VERSION:730}
  root: ${ORISUN_FDB_ROOT:orisun}
  scanLimit: ${ORISUN_FDB_SCAN_LIMIT:100000}

postgres:
  user: ${ORISUN_PG_USER:postgres}
  name: ${ORISUN_PG_NAME:orisun}
  password: ${ORISUN_PG_PASSWORD:postgres}
  host: ${ORISUN_PG_HOST:localhost}
  port: ${ORISUN_PG_PORT:5434}
  schemas: ${ORISUN_PG_SCHEMAS:`orisun_test_1:public,orisun_test_2:test2,orisun_admin:admin`}
  sslmode: ${ORISUN_PG_SSLMODE:disable}
  # Pool sizing notes:
  # - MaxOpenConns caps total connections per pool. Sum of all pools must fit under PG max_connections
  #   (or pgbouncer pool size if fronted).
  # - MaxIdleConns kept close to MaxOpenConns avoids cold-start cost on traffic bursts. Tradeoff = idle memory.
  # - Idle/Lifetime tuned long to keep warm conns; rotate periodically to play nicely with PG/pgbouncer balancers.
  # Write pool (Save path)
  writeMaxOpenConns: ${ORISUN_PG_WRITE_MAX_OPEN_CONNS:25}
  writeMaxIdleConns: ${ORISUN_PG_WRITE_MAX_IDLE_CONNS:10}
  writeConnMaxIdleTime: ${ORISUN_PG_WRITE_CONN_MAX_IDLE_TIME:5m}
  writeConnMaxLifetime: ${ORISUN_PG_WRITE_CONN_MAX_LIFETIME:30m}
  # Read pool (Get path + projectors)
  readMaxOpenConns: ${ORISUN_PG_READ_MAX_OPEN_CONNS:50}
  readMaxIdleConns: ${ORISUN_PG_READ_MAX_IDLE_CONNS:25}
  readConnMaxIdleTime: ${ORISUN_PG_READ_CONN_MAX_IDLE_TIME:5m}
  readConnMaxLifetime: ${ORISUN_PG_READ_CONN_MAX_LIFETIME:30m}
  # Admin pool (low-volume admin DB ops)
  adminMaxOpenConns: ${ORISUN_PG_ADMIN_MAX_OPEN_CONNS:5}
  adminMaxIdleConns: ${ORISUN_PG_ADMIN_MAX_IDLE_CONNS:2}
  adminConnMaxIdleTime: ${ORISUN_PG_ADMIN_CONN_MAX_IDLE_TIME:5m}
  adminConnMaxLifetime: ${ORISUN_PG_ADMIN_CONN_MAX_LIFETIME:30m}
  listenEnabled: ${ORISUN_PG_LISTEN_ENABLED:true}

boundaries: ${ORISUN_BOUNDARIES:`[{"name":"orisun_test_1","description":"boundary1"},{"name":"orisun_test_2","description":"boundary2"},{"name":"orisun_admin","description":"boundary3"}]`}

grpc:
  port: ${ORISUN_GRPC_PORT:5005}
  enableReflection: ${ORISUN_GRPC_ENABLE_REFLECTION:true}
  connectionTimeout: ${ORISUN_GRPC_CONNECTION_TIMEOUT:60s}
  keepAliveTime: ${ORISUN_GRPC_KEEP_ALIVE_TIME:30s}
  keepAliveTimeout: ${ORISUN_GRPC_KEEP_ALIVE_TIMEOUT:5s}
  maxConcurrentStreams: ${ORISUN_GRPC_MAX_CONCURRENT_STREAMS:10000}
  # High-performance optimization settings
  maxReceiveMessageSize: ${ORISUN_GRPC_MAX_RECEIVE_MESSAGE_SIZE:67108864}  # 64MB
  maxSendMessageSize: ${ORISUN_GRPC_MAX_SEND_MESSAGE_SIZE:67108864}        # 64MB
  initialWindowSize: ${ORISUN_GRPC_INITIAL_WINDOW_SIZE:1048576}            # 1MB
  initialConnWindowSize: ${ORISUN_GRPC_INITIAL_CONN_WINDOW_SIZE:1048576}   # 1MB
  writeBufferSize: ${ORISUN_GRPC_WRITE_BUFFER_SIZE:65536}                  # 64KB
  readBufferSize: ${ORISUN_GRPC_READ_BUFFER_SIZE:65536}                    # 64KB
  keepaliveMinTime: ${ORISUN_GRPC_KEEPALIVE_MIN_TIME:5s}
  keepalivePermitWithoutStream: ${ORISUN_GRPC_KEEPALIVE_PERMIT_WITHOUT_STREAM:true}
  # TLS configuration
  tls:
    enabled: ${ORISUN_GRPC_TLS_ENABLED:false}
    certFile: ${ORISUN_GRPC_TLS_CERT_FILE:/etc/orisun/tls/server.crt}
    keyFile: ${ORISUN_GRPC_TLS_KEY_FILE:/etc/orisun/tls/server.key}
    caFile: ${ORISUN_GRPC_TLS_CA_FILE:/etc/orisun/tls/ca.crt}               # Optional: for client certificate authentication
    clientAuthRequired: ${ORISUN_GRPC_TLS_CLIENT_AUTH_REQUIRED:false}      # Require client certificates
nats:
  # When set, Orisun connects to this JetStream-enabled NATS server instead of starting embedded NATS.
  url: ${ORISUN_NATS_URL:}
  serverName: ${ORISUN_NATS_SERVER_NAME:orisun-nats-2}
  port: ${ORISUN_NATS_PORT:4224}
  maxPayload: ${ORISUN_NATS_MAX_PAYLOAD:1048576}
  storeDir: ${ORISUN_NATS_STORE_DIR:./data/orisun/nats} # storeDir is the directory where NATS server will store its data, will default to /var/lib/orisun/nats in docker
  # Event-delivery JetStream bounds (per-boundary stream, in-memory).
  # MaxBytes caps memory; oldest messages evicted when limit hit.
  # MaxAge sets retention overlap window for catch-up subscribers (must exceed catch-up grace).
  eventStreamMaxBytes: ${ORISUN_NATS_EVENT_STREAM_MAX_BYTES:536870912}  # 512MB
  eventStreamMaxMsgs: ${ORISUN_NATS_EVENT_STREAM_MAX_MSGS:-1}
  eventStreamMaxAge: ${ORISUN_NATS_EVENT_STREAM_MAX_AGE:5m}
  # Cap of in-flight PublishAsync acks for async publish paths.
  publishAsyncMaxPending: ${ORISUN_NATS_PUBLISH_ASYNC_MAX_PENDING:8192}
  cluster:
    name: ${ORISUN_NATS_CLUSTER_NAME:orisun-nats-cluster}
    host: ${ORISUN_NATS_CLUSTER_HOST:0.0.0.0}
    port: ${ORISUN_NATS_CLUSTER_PORT:6222}
    username: ${ORISUN_NATS_CLUSTER_USERNAME:nats}
    password: ${ORISUN_NATS_CLUSTER_PASSWORD:password@1}
    enabled: ${ORISUN_NATS_CLUSTER_ENABLED:false}
    timeout: ${ORISUN_NATS_CLUSTER_TIMEOUT:1800s}
    routes: ${ORISUN_NATS_CLUSTER_ROUTES:`nats://0.0.0.0:6223,nats://0.0.0.0:6224`}
pollingPublisher:
  batchSize: ${ORISUN_POLLING_PUBLISHER_BATCH_SIZE:1000}
logging:
  level: ${ORISUN_LOGGING_LEVEL:INFO}

# authentication configuration
auth:
  adminUsername: ${ORISUN_ADMIN_USERNAME:admin}
  adminPassword: ${ORISUN_ADMIN_PASSWORD:changeit}

# admin dashboard configuration
admin:
  port: ${ORISUN_ADMIN_PORT:8991}
  boundary: ${ORISUN_ADMIN_BOUNDARY:orisun_admin}


pprof:
  enabled: ${ORISUN_PPROF_ENABLED:false}
  port: ${ORISUN_PPROF_PORT:6060}

# OpenTelemetry configuration
openTelemetry:
  enabled: ${ORISUN_OTEL_ENABLED:true}
  endpoint: ${ORISUN_OTEL_ENDPOINT:localhost:4317}  # OTLP gRPC endpoint
  serviceName: ${ORISUN_OTEL_SERVICE_NAME:orisun}
