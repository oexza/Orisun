name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (without v prefix)'
        required: true
        type: string
      docker_only:
        description: 'Only build Docker images'
        required: false
        type: boolean
        default: false
      release_notes:
        description: 'Optional release notes markdown. Falls back to tag annotation or commit log.'
        required: false
        type: string

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true

      - name: Extract version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Set version environment variable
        run: echo "VERSION=v${{ steps.get_version.outputs.version }}" >> $GITHUB_ENV

      - name: Run tests
        run: go test -p 1 -timeout 90m -v ./...

  build-binaries:
    name: Build Binaries
    needs: validate
    if: ${{ !inputs.docker_only }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            flavor: pg
            package: ./cmd/orisun-pg
            binary: orisun-pg
          - os: linux
            arch: arm64
            flavor: pg
            package: ./cmd/orisun-pg
            binary: orisun-pg
          - os: darwin
            arch: amd64
            flavor: pg
            package: ./cmd/orisun-pg
            binary: orisun-pg
          - os: darwin
            arch: arm64
            flavor: pg
            package: ./cmd/orisun-pg
            binary: orisun-pg
          - os: windows
            arch: amd64
            flavor: pg
            package: ./cmd/orisun-pg
            binary: orisun-pg
            extension: .exe
          - os: linux
            arch: amd64
            flavor: sqlite
            package: ./cmd/orisun-sqlite
            binary: orisun-sqlite
          - os: linux
            arch: arm64
            flavor: sqlite
            package: ./cmd/orisun-sqlite
            binary: orisun-sqlite
          - os: darwin
            arch: amd64
            flavor: sqlite
            package: ./cmd/orisun-sqlite
            binary: orisun-sqlite
          - os: darwin
            arch: arm64
            flavor: sqlite
            package: ./cmd/orisun-sqlite
            binary: orisun-sqlite
          - os: windows
            arch: amd64
            flavor: sqlite
            package: ./cmd/orisun-sqlite
            binary: orisun-sqlite
            extension: .exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true

      - name: Build binary
        run: |
          mkdir -p build
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build \
            -ldflags="-w -s -X 'github.com/OrisunLabs/Orisun/orisun.Version=v${{ needs.validate.outputs.version }}' -X 'github.com/OrisunLabs/Orisun/orisun.BuildTime=$(date -u +'%Y-%m-%dT%H:%M:%SZ')' -X 'github.com/OrisunLabs/Orisun/orisun.GitCommit=${GITHUB_SHA::8}'" \
            -o build/${{ matrix.binary }}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.extension || '' }} \
            ${{ matrix.package }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.os }}-${{ matrix.arch }}
          path: build/${{ matrix.binary }}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.extension || '' }}
          if-no-files-found: error



  build-fdb:
    name: Build FoundationDB Binary (${{ matrix.arch }})
    needs: validate
    if: ${{ !inputs.docker_only }}
    runs-on: ${{ matrix.runner }}
    env:
      FDB_VERSION: '7.3.77'
    strategy:
      matrix:
        include:
          - arch: amd64
            deb_arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            deb_arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true

      # The FDB Go binding is cgo and links libfdb_c at build and run time, so the
      # binary is built natively per arch (no cross-compile) against the installed
      # client package.
      - name: Install FoundationDB client library
        run: |
          curl -fsSL -o /tmp/clients.deb \
            "https://github.com/apple/foundationdb/releases/download/${FDB_VERSION}/foundationdb-clients_${FDB_VERSION}-1_${{ matrix.deb_arch }}.deb"
          sudo dpkg -i /tmp/clients.deb

      - name: Build binary
        run: |
          mkdir -p build
          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.arch }} go build \
            -tags foundationdb \
            -ldflags="-X 'github.com/OrisunLabs/Orisun/orisun.Version=v${{ needs.validate.outputs.version }}' -X 'github.com/OrisunLabs/Orisun/orisun.BuildTime=$(date -u +'%Y-%m-%dT%H:%M:%SZ')' -X 'github.com/OrisunLabs/Orisun/orisun.GitCommit=${GITHUB_SHA::8}'" \
            -o build/orisun-fdb-linux-${{ matrix.arch }} \
            ./cmd/orisun-fdb

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: orisun-fdb-linux-${{ matrix.arch }}
          path: build/orisun-fdb-linux-${{ matrix.arch }}
          if-no-files-found: error

  build-flutter-native:
    name: Flutter Native (${{ matrix.os }}/${{ matrix.arch }})
    needs: validate
    if: ${{ !inputs.docker_only }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            os: darwin
            arch: arm64
          - runner: macos-latest
            os: darwin
            arch: amd64
          - runner: ubuntu-latest
            os: linux
            arch: amd64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
          - runner: windows-latest
            os: windows
            arch: amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true

      - name: Set up Windows C toolchain
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          path-type: inherit
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Build native library
        if: runner.os != 'Windows'
        run: ./scripts/build_desktop.sh ${{ matrix.os }} ${{ matrix.arch }}

      - name: Build Windows native library
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ./scripts/build_desktop.sh ${{ matrix.os }} ${{ matrix.arch }}

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: orisun-flutter-${{ matrix.os }}-${{ matrix.arch }}
          path: build/desktop/${{ matrix.os }}-${{ matrix.arch }}/
          if-no-files-found: error

  build-flutter-mobile:
    name: Flutter Native (Android/iOS)
    needs: validate
    if: ${{ !inputs.docker_only }}
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true

      - name: Build mobile bridges
        run: |
          go tool gomobile init
          ./scripts/build_mobile.sh

      - name: Upload mobile and Flutter bridges
        uses: actions/upload-artifact@v4
        with:
          name: orisun-flutter-mobile
          path: |
            build/mobile/orisun-mobile.aar
            build/mobile/OrisunMobile.xcframework.zip
            build/mobile/orisun-flutter-mobile.aar
            build/mobile/OrisunFlutterMobile.xcframework
            build/mobile/OrisunFlutterMobile.xcframework.zip
            build/mobile/SHA256SUMS
          if-no-files-found: error

  build-flutter-package:
    name: Assemble Flutter Native Package
    needs: [validate, build-flutter-native, build-flutter-mobile]
    if: ${{ !inputs.docker_only }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          pattern: orisun-flutter-*
          path: native-artifacts

      - name: Download Android and iOS bridges
        uses: actions/download-artifact@v4
        with:
          name: orisun-flutter-mobile
          path: build/mobile

      - name: Arrange native target directories
        run: |
          for artifact in native-artifacts/orisun-flutter-*; do
            if [[ "${artifact}" == *"orisun-flutter-mobile" ]]; then
              continue
            fi
            target="${artifact##*orisun-flutter-}"
            mkdir -p "build/desktop/${target}"
            cp -a "${artifact}/." "build/desktop/${target}/"
          done

      - name: Assemble Flutter package
        run: |
          ./scripts/package_flutter.sh \
            darwin-arm64 darwin-amd64 \
            linux-arm64 linux-amd64 \
            windows-amd64

      - name: Upload Flutter package
        uses: actions/upload-artifact@v4
        with:
          name: orisun-flutter-package
          path: build/flutter/orisun_flutter-*.tar.gz
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [validate, build-binaries, build-fdb, build-flutter-package]
    if: ${{ !inputs.docker_only }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: release_notes
        env:
          RELEASE_NOTES_INPUT: ${{ inputs.release_notes }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          cat > release-notes.md <<EOF
          ## Orisun v${VERSION}

          EOF

          MANUAL_NOTES="$RELEASE_NOTES_INPUT"
          if [ -n "$MANUAL_NOTES" ]; then
            printf "%s\n" "$MANUAL_NOTES" >> release-notes.md
          elif [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            git fetch --force origin "refs/tags/v${VERSION}:refs/tags/v${VERSION}"
            TAG_NOTES=$(git tag -l "v${VERSION}" --format='%(contents)' | sed '/^-----BEGIN PGP SIGNATURE-----$/,$d')
            if [ -n "$TAG_NOTES" ] && [ "$TAG_NOTES" != "Release v${VERSION}" ]; then
              printf "%s\n" "$TAG_NOTES" >> release-notes.md
            fi
          fi

          if [ "$(wc -l < release-notes.md | tr -d ' ')" -le 2 ]; then
            if [ -z "$PREVIOUS_TAG" ]; then
              echo "Initial release" >> release-notes.md
            else
              echo "## Changes" >> release-notes.md
              echo "" >> release-notes.md
              git log --pretty=format:"* %s (%h)" "$PREVIOUS_TAG"..HEAD >> release-notes.md
              echo "" >> release-notes.md
            fi
          fi

          cat >> release-notes.md <<EOF

          ## Installation

          ### Linux
          \`\`\`bash
          # PostgreSQL-only binary
          curl -L https://github.com/OrisunLabs/Orisun/releases/download/v${VERSION}/orisun-pg-linux-amd64 -o orisun-pg
          chmod +x orisun-pg

          # SQLite-only binary
          curl -L https://github.com/OrisunLabs/Orisun/releases/download/v${VERSION}/orisun-sqlite-linux-amd64 -o orisun-sqlite
          chmod +x orisun-sqlite

          # FoundationDB-only binary (Linux only; requires the FoundationDB
          # client library installed: foundationdb-clients ${FDB_VERSION:-7.3.x})
          curl -L https://github.com/OrisunLabs/Orisun/releases/download/v${VERSION}/orisun-fdb-linux-amd64 -o orisun-fdb
          chmod +x orisun-fdb
          \`\`\`

          ### macOS
          \`\`\`bash
          # PostgreSQL-only binary for Apple Silicon
          curl -L https://github.com/OrisunLabs/Orisun/releases/download/v${VERSION}/orisun-pg-darwin-arm64 -o orisun-pg
          chmod +x orisun-pg

          # SQLite-only binary for Apple Silicon
          curl -L https://github.com/OrisunLabs/Orisun/releases/download/v${VERSION}/orisun-sqlite-darwin-arm64 -o orisun-sqlite
          chmod +x orisun-sqlite
          \`\`\`

          ### Windows
          Download the PostgreSQL-only or SQLite-only binary from the assets below.

          ### Docker
          \`\`\`bash
          docker pull orisunlabs/orisun:${VERSION}-pg
          docker pull orisunlabs/orisun:${VERSION}-sqlite
          docker pull orisunlabs/orisun:${VERSION}-fdb
          \`\`\`

          Channel tags are also available: \`pg\`, \`sqlite\`, and \`fdb\`.
          EOF

          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ needs.validate.outputs.version }}
          body_path: ${{ steps.release_notes.outputs.path }}
          files: |
            artifacts/**/*
          draft: false
          prerelease: false

  docker-release:
    name: Build and Push Docker Image (${{ matrix.flavor }})
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ needs.validate.result == 'success' }}
    permissions:
      packages: write
    strategy:
      matrix:
        include:
          - flavor: pg
            channel_tag: pg
            version_suffix: -pg
            dockerfile: Dockerfile
          - flavor: sqlite
            channel_tag: sqlite
            version_suffix: -sqlite
            dockerfile: Dockerfile
          - flavor: fdb
            channel_tag: fdb
            version_suffix: -fdb
            dockerfile: Dockerfile.fdb
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        # The Docker Hub account/token must have Read & Write access to
        # https://hub.docker.com/repository/docker/orisunlabs/orisun

      - name: Set Docker build metadata
        id: docker_meta
        run: |
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "git_commit=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            FLAVOR=${{ matrix.flavor }}
            BUILD_TIME=${{ steps.docker_meta.outputs.build_time }}
            GIT_COMMIT=${{ steps.docker_meta.outputs.git_commit }}
          tags: |
            ghcr.io/orisunlabs/orisun:${{ matrix.channel_tag }}
            ghcr.io/orisunlabs/orisun:${{ needs.validate.outputs.version }}${{ matrix.version_suffix }}
            orisunlabs/orisun:${{ matrix.channel_tag }}
            orisunlabs/orisun:${{ needs.validate.outputs.version }}${{ matrix.version_suffix }}
