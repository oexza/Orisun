name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (without v prefix)'
        required: true
        type: string
      docker_only:
        description: 'Only build Docker images'
        required: false
        type: boolean
        default: false
      release_notes:
        description: 'Optional release notes markdown. Falls back to tag annotation or commit log.'
        required: false
        type: string

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          check-latest: true

      - name: Extract version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Set version environment variable
        run: echo "VERSION=v${{ steps.get_version.outputs.version }}" >> $GITHUB_ENV

      - name: Run tests
        run: go test -v ./...

  build-binaries:
    name: Build Binaries
    needs: validate
    if: ${{ !inputs.docker_only }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
            extension: .exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          check-latest: true

      - name: Build binary
        run: |
          mkdir -p build
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build \
            -ldflags="-w -s -X 'orisun/common.Version=${{ env.VERSION }}' -X 'orisun/common.BuildTime=$(date -u +'%Y-%m-%dT%H:%M:%SZ')' -X 'orisun/common.GitCommit=${GITHUB_SHA::8}'" \
            -o build/orisun-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.extension || '' }} \
            ./cmd

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: orisun-${{ matrix.os }}-${{ matrix.arch }}
          path: build/orisun-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.extension || '' }}
          if-no-files-found: error



  create-release:
    name: Create GitHub Release
    needs: [validate, build-binaries]
    if: ${{ !inputs.docker_only }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: release_notes
        env:
          RELEASE_NOTES_INPUT: ${{ inputs.release_notes }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          cat > release-notes.md <<EOF
          ## Orisun v${VERSION}

          EOF

          MANUAL_NOTES="$RELEASE_NOTES_INPUT"
          if [ -n "$MANUAL_NOTES" ]; then
            printf "%s\n" "$MANUAL_NOTES" >> release-notes.md
          elif [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            TAG_NOTES=$(git tag -l "v${VERSION}" --format='%(contents)' | sed '/^-----BEGIN PGP SIGNATURE-----$/,$d')
            if [ -n "$TAG_NOTES" ] && [ "$TAG_NOTES" != "Release v${VERSION}" ]; then
              printf "%s\n" "$TAG_NOTES" >> release-notes.md
            fi
          fi

          if [ "$(wc -l < release-notes.md | tr -d ' ')" -le 2 ]; then
            if [ -z "$PREVIOUS_TAG" ]; then
              echo "Initial release" >> release-notes.md
            else
              echo "## Changes" >> release-notes.md
              echo "" >> release-notes.md
              git log --pretty=format:"* %s (%h)" "$PREVIOUS_TAG"..HEAD >> release-notes.md
              echo "" >> release-notes.md
            fi
          fi

          cat >> release-notes.md <<EOF

          ## Installation

          ### Linux
          \`\`\`bash
          # For amd64
          curl -L https://github.com/oexza/Orisun/releases/download/v${VERSION}/orisun-linux-amd64 -o orisun
          chmod +x orisun

          # For arm64
          curl -L https://github.com/oexza/Orisun/releases/download/v${VERSION}/orisun-linux-arm64 -o orisun
          chmod +x orisun
          \`\`\`

          ### macOS
          \`\`\`bash
          # For amd64
          curl -L https://github.com/oexza/Orisun/releases/download/v${VERSION}/orisun-darwin-amd64 -o orisun
          chmod +x orisun

          # For arm64 (Apple Silicon)
          curl -L https://github.com/oexza/Orisun/releases/download/v${VERSION}/orisun-darwin-arm64 -o orisun
          chmod +x orisun
          \`\`\`

          ### Windows
          Download the appropriate binary from the assets below.
          EOF

          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ needs.validate.outputs.version }}
          body_path: ${{ steps.release_notes.outputs.path }}
          files: |
            artifacts/**/*
          draft: false
          prerelease: false

  docker-release:
    name: Build and Push Docker Images
    needs: validate
    runs-on: ubuntu-latest
    if: ${{ !inputs.docker_only || always() }}
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        # Note: You must add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets in your GitHub repository settings

      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
            GIT_COMMIT=${GITHUB_SHA::8}
          tags: |
            ghcr.io/oexza/orisun:latest
            ghcr.io/oexza/orisun:${{ needs.validate.outputs.version }}
            orexza/orisun:latest
            orexza/orisun:${{ needs.validate.outputs.version }}
