name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Orisun Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test -p 1 -timeout 90m -v ./...

  foundationdb-test:
    name: Test FoundationDB Backend
    runs-on: ubuntu-latest
    env:
      FDB_VERSION: '7.3.77'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run FoundationDB backend tests
        run: scripts/fdb_test_container.sh -run TestFoundationDB -v

      - name: Run FoundationDB gRPC ledger workload
        run: TEST_PKGS=./cmd/ scripts/fdb_test_container.sh -run TestE2E_LedgerWorkload_FoundationDB -v

      - name: Build FoundationDB binary
        run: TEST_PKGS=./cmd/orisun-fdb scripts/fdb_test_container.sh -run '^$'

  # lint:
  #   name: Lint
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #       with:
