  #     - name: Set up Go
  #       uses: actions/setup-go@v5
  #       with:
  #         go-version: '1.26.5'
  #         check-latest: true

  #     - name: golangci-lint
  #       uses: golangci/golangci-lint-action@v4
  #       with:
