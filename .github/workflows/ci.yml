  build:
    name: Build Orisun Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          check-latest: true

      - name: Build
        run: go build -v ./...

      - name: Build Docker image
        run: docker build -t orisun:test --build-arg FLAVOR=all .

      - name: Build PostgreSQL-only Docker image
        run: docker build -t orisun-pg:test --build-arg FLAVOR=pg .

      - name: Build SQLite-only Docker image
        run: docker build -t orisun-sqlite:test --build-arg FLAVOR=sqlite .
